name: Java CI with Maven

# Builder analog of .github/workflows/maven.yml.
# Fires on pushes to main and can be run manually.
on: [push, manual]
push:
  branches: [main]

jobs:
  build:
    image: maven:3.9-eclipse-temurin-21
    cache:
      key: m2-spring-cloud-examples
      paths: [.m2/repository]
    steps:
      - name: Checkout
        run: git clone --depth 1 https://github.com/alexmond/spring-cloud-examples.git .
      - name: Build with Maven
        run: mvn -B package --file pom.xml -Dmaven.repo.local=.m2/repository
